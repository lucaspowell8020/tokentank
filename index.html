<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Gauge</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <p class="eyebrow">Claude Gauge</p>
      <p class="tagline">Remaining usage, estimated from your local transcripts.</p>

      <!-- 5-hour session tank: automotive dial -->
      <section class="dial-wrap">
        <svg viewBox="0 0 240 132" id="dial">
          <!-- track -->
          <path d="M 28 120 A 92 92 0 0 1 212 120" class="dial-track" />
          <!-- zones: E-side quarter vermillion, next quarter amber -->
          <path d="M 28 120 A 92 92 0 0 1 54.9 54.9" class="dial-zone low" />
          <path d="M 54.9 54.9 A 92 92 0 0 1 120 28" class="dial-zone warn" />
          <!-- ticks at E, 1/4, 1/2, 3/4, F -->
          <g class="dial-ticks">
            <line x1="14" y1="120" x2="42" y2="120" />
            <line x1="45" y1="45" x2="64.8" y2="64.8" />
            <line x1="120" y1="14" x2="120" y2="42" />
            <line x1="195" y1="45" x2="175.2" y2="64.8" />
            <line x1="226" y1="120" x2="198" y2="120" />
          </g>
          <!-- needle -->
          <g id="needle">
            <line x1="120" y1="120" x2="196" y2="120" class="needle-line" />
          </g>
          <circle cx="120" cy="120" r="9" class="needle-hub" />
          <text x="14" y="131" class="ef">E</text>
          <text x="219" y="131" class="ef">F</text>
        </svg>
        <div class="dial-reading">
          <span class="pct" id="pct-5h">--%</span>
          <span class="pct-cap">of your 5-hour tank left</span>
        </div>
        <p class="countdown" id="cd-5h">reading transcripts…</p>
      </section>

      <!-- Weekly tank: horizontal fuel bar -->
      <section class="week-wrap">
        <div class="week-head">
          <span class="week-label">Weekly tank</span>
          <span class="week-pct" id="pct-wk">--%</span>
        </div>
        <div class="tank">
          <div class="tank-fill" id="tank-fill"></div>
          <span class="tank-tick" style="left: 25%"></span>
          <span class="tank-tick" style="left: 50%"></span>
          <span class="tank-tick" style="left: 75%"></span>
        </div>
        <div class="tank-ef"><span>E</span><span>F</span></div>
        <p class="countdown" id="cd-wk"></p>
      </section>

      <p class="note" id="calibration-note"></p>

      <section class="stats">
        <div class="stat">
          <span class="stat-label">Burn rate</span>
          <span class="stat-val" id="burn">--</span>
        </div>
        <div class="stat">
          <span class="stat-label">Today</span>
          <span class="stat-val" id="today">--</span>
        </div>
        <div class="stat">
          <span class="stat-label">Last 30 days</span>
          <span class="stat-val" id="month">--</span>
        </div>
        <div class="stat">
          <span class="stat-label">Plan multiple</span>
          <span class="stat-val" id="mult">--</span>
        </div>
      </section>

      <footer>
        <span id="plan-line">plan: not set</span>
        <a href="https://agentshortlist.com/claude-usage" target="_blank" rel="noopener"
          >agentshortlist.com</a
        >
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
